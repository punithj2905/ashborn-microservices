
services:
  postgres:
    container_name: ms_pg_sql
    image: postgres:15
    environment:
      POSTGRES_USER: shadow
      POSTGRES_PASSWORD: shadow
      POSTGRES_DB: ashborn_db
      PGDATA: /var/lib/postgresql/data
    volumes:
      - postgres:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - microservices-net
    restart: unless-stopped

  pgadmin:
    container_name: ms_pgadmin
    image: dpage/pgadmin4
    environment:
      PGADMIN_DEFAULT_EMAIL: pgadmin@pgadmin.org
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: "False"
    volumes:
      - pgadmin:/var/lib/pgadmin
    ports:
      - "5050:80"
    networks:
      - microservices-net
    restart: unless-stopped

  # mysql:
  #   container_name: ms_mysql_db
  #   image: mysql:8
  #   environment:
  #     MYSQL_ROOT_PASSWORD: shadow
  #     MYSQL_DATABASE: ashborn_db
  #     MYSQL_USER: shadow
  #     MYSQL_PASSWORD: shadow
  #   volumes:
  #     - mysql:/var/lib/mysql
  #   ports:
  #     - "3306:3306"
  #   networks:
  #     - microservices-net
  #   restart: unless-stopped

  mail-dev:
    container_name: ms_mail_dev
    image: maildev/maildev
    ports:
      - "1080:1080"
      - "1025:1025"
    networks:
      - microservices-net
    restart: unless-stopped

networks:
  microservices-net:
    driver: bridge

volumes:
  postgres:
  pgadmin:
  mysql:


